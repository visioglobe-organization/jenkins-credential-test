name: jenkins-credential-test
on:
  push:
    branches:
    - master
env:
#   # This item has no matching transformer
#   API_TOKEN:
jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
    - name: echo message
      run: echo Building the app...
    - name: sh
      shell: bash
      run: echo build complete
  Use_Credential:
    name: Use Credential
    runs-on: ubuntu-latest
    needs: Build
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
    - name: sh
      shell: bash
      run: |-
        echo "Using API token..."
        echo "Token is: $API_TOKEN"
        curl -H "Authorization: Bearer $API_TOKEN" https://httpbin.org/get || true
  Test:
    runs-on: ubuntu-latest
    needs: Use_Credential
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
    - name: echo message
      run: echo Running tests...
    - name: sh
      shell: bash
      run: echo all tests passed
  Post-Build:
    if: always()
    name: Post Build
    runs-on: ubuntu-latest
    needs:
    - Build
    - Use_Credential
    - Test
    steps:
    - name: snapshot post build workflow status
      run: |-
        echo "success=${{ contains(needs.*.result,'success') && !contains(needs.*.result,'cancelled') && !contains(needs.*.result,'failure') }}" >> $GITHUB_OUTPUT
        echo "failure=${{ contains(needs.*.result,'failure') && !contains(needs.*.result,'cancelled') }}" >> $GITHUB_OUTPUT
      id: post_build
    - name: echo message
      run: echo Pipeline failed!
      if: steps.post_build.outputs.failure == 'true'
    - name: echo message
      run: echo Pipeline succeeded!
      if: steps.post_build.outputs.success == 'true'
